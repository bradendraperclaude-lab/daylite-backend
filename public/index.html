<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daylite — Task Manager</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #EEF3FA;
    --ink: #0F1E35;
    --warm-mid: #5272A0;
    --accent: #1D5FBF;
    --accent-light: #4E8FE8;
    --surface: #DDE6F5;
    --surface2: #C8D8EE;
    --done-color: #3A8F6E;
    --high: #C4312D;
    --medium: #2D7EC4;
    --low: #3A8F6E;
    --shadow: 0 2px 12px rgba(15,30,53,0.08);
    --shadow-lg: 0 8px 32px rgba(15,30,53,0.14);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--cream);
    color: var(--ink);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Subtle grain texture */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
    opacity: 0.4;
  }

  /* ── HEADER ── */
  header {
    padding: 48px 64px 0;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    position: relative;
    z-index: 1;
  }

  .brand h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 2.8rem;
    color: var(--ink);
    line-height: 1;
    letter-spacing: -0.02em;
  }

  .brand h1 span {
    color: var(--accent);
    font-style: italic;
  }

  .date-block {
    text-align: right;
  }

  .date-block .day {
    font-family: 'DM Serif Display', serif;
    font-size: 1rem;
    color: var(--warm-mid);
    font-style: italic;
  }

  .date-block .full-date {
    font-size: 0.8rem;
    color: var(--warm-mid);
    font-weight: 300;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-top: 2px;
  }

  /* ── STATS BAR ── */
  .stats-bar {
    margin: 32px 64px 0;
    display: flex;
    gap: 2px;
    position: relative;
    z-index: 1;
  }

  .stat {
    background: var(--surface);
    padding: 16px 24px;
    flex: 1;
    border-radius: 0;
    transition: background 0.2s;
  }

  .stat:first-child { border-radius: 12px 0 0 12px; }
  .stat:last-child { border-radius: 0 12px 12px 0; }

  .stat-num {
    font-family: 'DM Serif Display', serif;
    font-size: 2rem;
    line-height: 1;
    color: var(--ink);
  }

  .stat-label {
    font-size: 0.72rem;
    color: var(--warm-mid);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-top: 4px;
    font-weight: 500;
  }

  /* Progress bar */
  .progress-wrap {
    margin: 16px 64px 0;
    position: relative;
    z-index: 1;
  }

  .progress-track {
    height: 4px;
    background: var(--surface2);
    border-radius: 2px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent-light));

    border-radius: 2px;
    transition: width 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
    width: 0%;
  }

  .progress-label {
    font-size: 0.72rem;
    color: var(--warm-mid);
    margin-top: 6px;
    font-weight: 500;
  }

  /* ── MAIN LAYOUT ── */
  main {
    display: grid;
    grid-template-columns: 1fr 340px;
    gap: 24px;
    padding: 32px 64px 64px;
    position: relative;
    z-index: 1;
  }

  /* ── ADD TASK ── */
  .add-task-card {
    background: var(--ink);
    border-radius: 16px;
    padding: 28px 32px;
    margin-bottom: 24px;
    box-shadow: var(--shadow-lg);
  }

  .add-task-card h2 {
    font-family: 'DM Serif Display', serif;
    font-size: 1.1rem;
    color: var(--cream);
    margin-bottom: 20px;
    font-style: italic;
  }

  .input-row {
    display: flex;
    gap: 10px;
    margin-bottom: 12px;
  }

  .task-input {
    flex: 1;
    background: rgba(245,240,232,0.1);
    border: 1px solid rgba(245,240,232,0.15);
    border-radius: 10px;
    padding: 12px 16px;
    color: var(--cream);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    outline: none;
    transition: border-color 0.2s, background 0.2s;
  }

  .task-input::placeholder { color: rgba(245,240,232,0.35); }

  .task-input:focus {
    border-color: var(--accent-light);
    background: rgba(245,240,232,0.15);
  }

  .meta-row {
    display: flex;
    gap: 10px;
  }

  .meta-select {
    background: rgba(245,240,232,0.1);
    border: 1px solid rgba(245,240,232,0.15);
    border-radius: 10px;
    padding: 10px 14px;
    color: var(--cream);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.82rem;
    outline: none;
    cursor: pointer;
    flex: 1;
    transition: border-color 0.2s;
  }

  .meta-select option { background: var(--ink); }
  .meta-select:focus { border-color: var(--accent-light); }

  .date-input {
    background: rgba(245,240,232,0.1);
    border: 1px solid rgba(245,240,232,0.15);
    border-radius: 10px;
    padding: 10px 14px;
    color: var(--cream);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.82rem;
    outline: none;
    flex: 1;
    transition: border-color 0.2s;
    color-scheme: dark;
  }

  .date-input:focus { border-color: var(--accent-light); }

  .add-btn {
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 10px;
    padding: 12px 20px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    white-space: nowrap;
    letter-spacing: 0.01em;
  }

  .add-btn:hover { background: #B5551F; }
  .add-btn:active { transform: scale(0.97); }

  /* ── FILTER TABS ── */
  .filter-tabs {
    display: flex;
    gap: 4px;
    margin-bottom: 16px;
    background: var(--surface);
    padding: 4px;
    border-radius: 10px;
    width: fit-content;
  }

  .filter-tab {
    padding: 7px 18px;
    border-radius: 7px;
    font-size: 0.8rem;
    font-weight: 500;
    cursor: pointer;
    border: none;
    background: transparent;
    color: var(--warm-mid);
    transition: all 0.2s;
    font-family: 'DM Sans', sans-serif;
  }

  .filter-tab.active {
    background: white;
    color: var(--ink);
    box-shadow: 0 1px 4px rgba(0,0,0,0.1);
  }

  /* ── TASK LIST ── */
  .tasks-section h3 {
    font-family: 'DM Serif Display', serif;
    font-size: 1rem;
    color: var(--warm-mid);
    font-style: italic;
    margin-bottom: 12px;
    padding-left: 4px;
  }

  .task-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .task-item {
    background: white;
    border-radius: 12px;
    padding: 16px 20px;
    display: flex;
    align-items: flex-start;
    gap: 14px;
    box-shadow: var(--shadow);
    transition: all 0.25s ease;
    border-left: 3px solid transparent;
    animation: slideIn 0.3s ease forwards;
    position: relative;
    overflow: hidden;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .task-item:hover {
    box-shadow: var(--shadow-lg);
    transform: translateY(-1px);
  }

  .task-item.priority-high { border-left-color: var(--high); }
  .task-item.priority-medium { border-left-color: var(--medium); }
  .task-item.priority-low { border-left-color: var(--low); }

  .task-item.done {
    opacity: 0.55;
    background: var(--surface);
  }

  .task-item.done .task-title {
    text-decoration: line-through;
    color: var(--warm-mid);
  }

  /* Custom checkbox */
  .check-wrap {
    position: relative;
    width: 20px;
    height: 20px;
    flex-shrink: 0;
    margin-top: 1px;
  }

  .check-wrap input[type="checkbox"] {
    opacity: 0;
    width: 0;
    height: 0;
    position: absolute;
  }

  .check-box {
    width: 20px;
    height: 20px;
    border: 2px solid var(--surface2);
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.2s;
    background: white;
  }

  .check-wrap input:checked + .check-box {
    background: var(--done-color);
    border-color: var(--done-color);
  }

  .check-box::after {
    content: '';
    width: 5px;
    height: 9px;
    border: 2px solid white;
    border-top: none;
    border-left: none;
    transform: rotate(45deg) scale(0);
    transition: transform 0.15s ease;
    margin-top: -2px;
  }

  .check-wrap input:checked + .check-box::after {
    transform: rotate(45deg) scale(1);
  }

  .task-body { flex: 1; min-width: 0; }

  .task-title {
    font-size: 0.92rem;
    font-weight: 500;
    color: var(--ink);
    line-height: 1.4;
    transition: color 0.2s;
  }

  .task-meta {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 6px;
    flex-wrap: wrap;
  }

  .priority-badge {
    font-size: 0.68rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    padding: 2px 8px;
    border-radius: 4px;
  }

  .badge-high { background: #FCDEDE; color: var(--high); }
  .badge-medium { background: #D6E8FA; color: var(--medium); }
  .badge-low { background: #D6F0E8; color: var(--low); }

  .task-due {
    font-size: 0.75rem;
    color: var(--warm-mid);
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .task-due.overdue { color: var(--high); font-weight: 600; }

  .cat-tag {
    font-size: 0.72rem;
    color: var(--warm-mid);
    background: var(--surface);
    padding: 2px 8px;
    border-radius: 4px;
  }

  .delete-btn {
    background: none;
    border: none;
    color: var(--surface2);
    cursor: pointer;
    padding: 2px 6px;
    border-radius: 6px;
    font-size: 1rem;
    transition: all 0.2s;
    flex-shrink: 0;
    line-height: 1;
    margin-top: -2px;
  }

  .delete-btn:hover { color: var(--high); background: #FDE8E0; }

  /* Empty state */
  .empty-state {
    text-align: center;
    padding: 48px 24px;
    color: var(--warm-mid);
  }

  .empty-state .empty-icon {
    font-size: 2.5rem;
    margin-bottom: 12px;
    opacity: 0.5;
  }

  .empty-state p {
    font-family: 'DM Serif Display', serif;
    font-style: italic;
    font-size: 1rem;
  }

  /* ── SIDEBAR ── */
  .sidebar { display: flex; flex-direction: column; gap: 20px; }

  .sidebar-card {
    background: white;
    border-radius: 16px;
    padding: 24px;
    box-shadow: var(--shadow);
  }

  .sidebar-card h3 {
    font-family: 'DM Serif Display', serif;
    font-size: 1rem;
    color: var(--ink);
    margin-bottom: 16px;
    font-style: italic;
  }

  /* Priority breakdown */
  .priority-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
  }

  .p-label {
    font-size: 0.78rem;
    font-weight: 500;
    width: 52px;
    color: var(--ink);
  }

  .p-bar-track {
    flex: 1;
    height: 6px;
    background: var(--surface);
    border-radius: 3px;
    overflow: hidden;
  }

  .p-bar-fill {
    height: 100%;
    border-radius: 3px;
    transition: width 0.5s ease;
  }

  .p-count {
    font-size: 0.78rem;
    color: var(--warm-mid);
    width: 20px;
    text-align: right;
  }

  /* Category list */
  .cat-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 0;
    border-bottom: 1px solid var(--surface);
    font-size: 0.84rem;
  }

  .cat-item:last-child { border-bottom: none; }
  .cat-name { color: var(--ink); font-weight: 500; }
  .cat-count {
    background: var(--surface);
    color: var(--warm-mid);
    padding: 2px 8px;
    border-radius: 20px;
    font-size: 0.75rem;
    font-weight: 600;
  }

  /* Quote card */
  .quote-card {
    background: var(--ink);
    border-radius: 16px;
    padding: 24px;
    box-shadow: var(--shadow-lg);
  }

  .quote-card blockquote {
    font-family: 'DM Serif Display', serif;
    font-style: italic;
    font-size: 1rem;
    color: var(--cream);
    line-height: 1.6;
    margin-bottom: 12px;
  }

  .quote-card cite {
    font-size: 0.75rem;
    color: var(--warm-mid);
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  /* ── RESPONSIVE ── */
  @media (max-width: 900px) {
    header, .stats-bar, .progress-wrap { padding-left: 24px; padding-right: 24px; }
    .stats-bar { margin-left: 24px; margin-right: 24px; }
    .progress-wrap { margin-left: 24px; margin-right: 24px; }
    main { grid-template-columns: 1fr; padding: 24px; }
    .sidebar { display: grid; grid-template-columns: 1fr 1fr; }
  }

  @media (max-width: 600px) {
    header { padding: 24px 16px 0; flex-direction: column; align-items: flex-start; gap: 8px; }
    .brand h1 { font-size: 2rem; }
    .date-block { text-align: left; }
    .stats-bar { margin: 16px 16px 0; }
    .progress-wrap { margin: 10px 16px 0; }
    main { padding: 16px; gap: 16px; }
    .stat { padding: 12px 16px; }
    .stat-num { font-size: 1.5rem; }
    .add-task-card { padding: 20px 16px; }
    .input-row { flex-direction: column; }
    .meta-row { flex-direction: column; }
    .add-btn { width: 100%; padding: 14px; font-size: 1rem; }
    .filter-tabs { flex-wrap: wrap; width: 100%; }
    .filter-tab { flex: 1; text-align: center; padding: 8px 10px; }
    .sidebar { grid-template-columns: 1fr; }
    .task-item { padding: 14px 12px; }
  }
</style>
</head>
<body>

<header>
  <div class="brand">
    <h1>Day<span>lite</span></h1>
  </div>
  <div class="date-block">
    <div class="day" id="dayName"></div>
    <div class="full-date" id="fullDate"></div>
  </div>
</header>

<div class="stats-bar">
  <div class="stat">
    <div class="stat-num" id="totalCount">0</div>
    <div class="stat-label">Total Tasks</div>
  </div>
  <div class="stat">
    <div class="stat-num" id="doneCount">0</div>
    <div class="stat-label">Completed</div>
  </div>
  <div class="stat">
    <div class="stat-num" id="remainingCount">0</div>
    <div class="stat-label">Remaining</div>
  </div>
  <div class="stat">
    <div class="stat-num" id="overdueCount" style="color:var(--accent)">0</div>
    <div class="stat-label">Overdue</div>
  </div>
</div>

<div class="progress-wrap">
  <div class="progress-track">
    <div class="progress-fill" id="progressFill"></div>
  </div>
  <div class="progress-label" id="progressLabel">No tasks yet — add one below</div>
</div>

<main>
  <div class="left-col">

    <!-- Add task -->
    <div class="add-task-card">
      <h2>Add a new task</h2>
      <div class="input-row">
        <input class="task-input" id="taskInput" type="text" placeholder="What needs to get done?" />
        <button class="add-btn" onclick="addTask()">+ Add</button>
      </div>
      <div class="meta-row">
        <select class="meta-select" id="prioritySelect">
          <option value="medium">⚡ Medium Priority</option>
          <option value="high">🔴 High Priority</option>
          <option value="low">🟢 Low Priority</option>
        </select>
        <select class="meta-select" id="categorySelect">
          <option value="Work">💼 Work</option>
          <option value="Personal">🏠 Personal</option>
          <option value="Health">💪 Health</option>
          <option value="Finance">💰 Finance</option>
          <option value="Learning">📚 Learning</option>
          <option value="Other">📌 Other</option>
        </select>
        <input class="date-input" id="dueDateInput" type="date" />
      </div>
    </div>

    <!-- Filters -->
    <div class="filter-tabs">
      <button class="filter-tab active" onclick="setFilter('all', this)">All</button>
      <button class="filter-tab" onclick="setFilter('active', this)">Active</button>
      <button class="filter-tab" onclick="setFilter('done', this)">Done</button>
      <button class="filter-tab" onclick="setFilter('high', this)">🔴 High</button>
      <button class="filter-tab" onclick="setFilter('overdue', this)">⏰ Overdue</button>
    </div>

    <!-- Task list -->
    <div class="tasks-section">
      <h3 id="listLabel">Today's tasks</h3>
      <div class="task-list" id="taskList"></div>
    </div>

  </div>

  <!-- Sidebar -->
  <div class="sidebar">

    <div class="sidebar-card">
      <h3>Priority Breakdown</h3>
      <div class="priority-row">
        <span class="p-label" style="color:var(--high)">High</span>
        <div class="p-bar-track"><div class="p-bar-fill" id="barHigh" style="background:var(--high);width:0%"></div></div>
        <span class="p-count" id="cntHigh">0</span>
      </div>
      <div class="priority-row">
        <span class="p-label" style="color:var(--medium)">Medium</span>
        <div class="p-bar-track"><div class="p-bar-fill" id="barMedium" style="background:var(--medium);width:0%"></div></div>
        <span class="p-count" id="cntMedium">0</span>
      </div>
      <div class="priority-row">
        <span class="p-label" style="color:var(--low)">Low</span>
        <div class="p-bar-track"><div class="p-bar-fill" id="barLow" style="background:var(--low);width:0%"></div></div>
        <span class="p-count" id="cntLow">0</span>
      </div>
    </div>

    <div class="sidebar-card">
      <h3>By Category</h3>
      <div id="categoryBreakdown">
        <div class="empty-state" style="padding:16px 0">
          <p style="font-size:0.82rem">No tasks yet</p>
        </div>
      </div>
    </div>

    <div class="quote-card">
      <blockquote id="quoteText">"The secret of getting ahead is getting started."</blockquote>
      <cite>— Mark Twain</cite>
    </div>

  </div>
</main>

<script>
  // ── DATA ──
  // Tasks now live on the backend server instead of localStorage.
  // Every action (add, toggle, delete) sends a fetch() request to http://localhost:3001.
  // fetch() is the browser's built-in way of talking to a server — like sending a letter
  // and waiting for a reply.
  const API = '';
  let tasks = [];
  let currentFilter = 'all';

  const quotes = [
    { text: "The secret of getting ahead is getting started.", author: "Mark Twain" },
    { text: "Focus on being productive instead of busy.", author: "Tim Ferriss" },
    { text: "It's not about having time, it's about making time.", author: "Unknown" },
    { text: "Done is better than perfect.", author: "Sheryl Sandberg" },
    { text: "One task at a time. That's enough. That's everything.", author: "Unknown" },
  ];

  // ── DATE SETUP ──
  function setupDate() {
    const now = new Date();
    const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
    const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
    document.getElementById('dayName').textContent = days[now.getDay()];
    document.getElementById('fullDate').textContent = `${months[now.getMonth()]} ${now.getDate()}, ${now.getFullYear()}`;
    document.getElementById('dueDateInput').value = now.toISOString().split('T')[0];
  }

  // ── LOAD TASKS FROM SERVER ──
  // On page load, fetch all tasks from the backend.
  // async/await means "wait for the server to reply before continuing"
  async function loadTasks() {
    try {
      const res = await fetch(`${API}/tasks`);
      tasks = await res.json();
      render();
    } catch (e) {
      document.getElementById('listLabel').textContent = '⚠️ Backend not running — start your server!';
    }
  }

  // ── ADD TASK ──
  // Sends a POST request to the server with the new task data.
  // The server saves it to tasks.json and sends back the created task.
  async function addTask() {
    const title = document.getElementById('taskInput').value.trim();
    if (!title) { document.getElementById('taskInput').focus(); return; }

    const body = {
      title,
      priority: document.getElementById('prioritySelect').value,
      category: document.getElementById('categorySelect').value,
      due: document.getElementById('dueDateInput').value,
    };

    // POST = "create something new on the server"
    const res = await fetch(`${API}/tasks`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });

    const newTask = await res.json();
    tasks.unshift(newTask);
    render();

    document.getElementById('taskInput').value = '';
    document.getElementById('taskInput').focus();
  }

  // ── TOGGLE DONE ──
  // Sends a PATCH request to update just the "done" field on the server.
  // PATCH = "update part of something that already exists"
  async function toggleDone(id) {
    const task = tasks.find(t => t.id === id);
    if (!task) return;

    const res = await fetch(`${API}/tasks/${id}`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ done: !task.done })
    });

    const updated = await res.json();
    tasks = tasks.map(t => t.id === id ? updated : t);
    render();
  }

  // ── DELETE ──
  // Sends a DELETE request to remove the task from tasks.json permanently.
  async function deleteTask(id) {
    await fetch(`${API}/tasks/${id}`, { method: 'DELETE' });
    tasks = tasks.filter(t => t.id !== id);
    render();
  }

  // ── FILTER ──
  function setFilter(filter, btn) {
    currentFilter = filter;
    document.querySelectorAll('.filter-tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
  }

  // ── OVERDUE CHECK ──
  function isOverdue(task) {
    if (!task.due || task.done) return false;
    return task.due < new Date().toISOString().split('T')[0];
  }

  // ── RENDER ──
  // Same as before — rebuilds the UI from the tasks array.
  // The only difference is tasks now come from the server, not localStorage.
  function render() {
    const today = new Date().toISOString().split('T')[0];

    // Filter tasks
    let filtered = tasks.filter(t => {
      if (currentFilter === 'active') return !t.done;
      if (currentFilter === 'done') return t.done;
      if (currentFilter === 'high') return t.priority === 'high' && !t.done;
      if (currentFilter === 'overdue') return isOverdue(t);
      return true;
    });

    // Stats
    const total = tasks.length;
    const done = tasks.filter(t => t.done).length;
    const remaining = tasks.filter(t => !t.done).length;
    const overdue = tasks.filter(t => isOverdue(t)).length;
    const pct = total > 0 ? Math.round((done / total) * 100) : 0;

    document.getElementById('totalCount').textContent = total;
    document.getElementById('doneCount').textContent = done;
    document.getElementById('remainingCount').textContent = remaining;
    document.getElementById('overdueCount').textContent = overdue;
    document.getElementById('progressFill').style.width = pct + '%';
    document.getElementById('progressLabel').textContent = total === 0
      ? 'No tasks yet — add one below'
      : `${pct}% complete · ${done} of ${total} tasks done`;

    // Priority bars
    const high = tasks.filter(t => t.priority === 'high').length;
    const medium = tasks.filter(t => t.priority === 'medium').length;
    const low = tasks.filter(t => t.priority === 'low').length;
    const maxP = Math.max(high, medium, low, 1);
    document.getElementById('barHigh').style.width = (high/maxP*100) + '%';
    document.getElementById('barMedium').style.width = (medium/maxP*100) + '%';
    document.getElementById('barLow').style.width = (low/maxP*100) + '%';
    document.getElementById('cntHigh').textContent = high;
    document.getElementById('cntMedium').textContent = medium;
    document.getElementById('cntLow').textContent = low;

    // Category breakdown
    const cats = {};
    tasks.filter(t => !t.done).forEach(t => { cats[t.category] = (cats[t.category] || 0) + 1; });
    const catHTML = Object.entries(cats).sort((a,b) => b[1]-a[1]).map(([name, count]) =>
      `<div class="cat-item"><span class="cat-name">${name}</span><span class="cat-count">${count}</span></div>`
    ).join('');
    document.getElementById('categoryBreakdown').innerHTML = catHTML ||
      '<div style="font-size:0.82rem;color:var(--warm-mid);padding:8px 0;font-style:italic">No active tasks</div>';

    // List label
    const labels = { all: "All tasks", active: "Active tasks", done: "Completed tasks", high: "High priority", overdue: "Overdue tasks" };
    document.getElementById('listLabel').textContent = labels[currentFilter];

    // Task items
    const list = document.getElementById('taskList');
    if (filtered.length === 0) {
      list.innerHTML = `<div class="empty-state"><div class="empty-icon">✓</div><p>Nothing here — looks like you're on top of things.</p></div>`;
      return;
    }

    // Sort: undone first, then by priority, then by due date
    const pOrder = { high: 0, medium: 1, low: 2 };
    filtered.sort((a, b) => {
      if (a.done !== b.done) return a.done ? 1 : -1;
      if (pOrder[a.priority] !== pOrder[b.priority]) return pOrder[a.priority] - pOrder[b.priority];
      if (a.due && b.due) return a.due.localeCompare(b.due);
      return 0;
    });

    list.innerHTML = filtered.map(task => {
      const over = isOverdue(task);
      const dueLabel = task.due
        ? (task.due === today ? '📅 Today' : over ? `⏰ ${task.due}` : `📅 ${task.due}`)
        : '';

      return `
        <div class="task-item priority-${task.priority} ${task.done ? 'done' : ''}">
          <label class="check-wrap">
            <input type="checkbox" ${task.done ? 'checked' : ''} onchange="toggleDone(${task.id})">
            <div class="check-box"></div>
          </label>
          <div class="task-body">
            <div class="task-title">${escapeHTML(task.title)}</div>
            <div class="task-meta">
              <span class="priority-badge badge-${task.priority}">${task.priority}</span>
              <span class="cat-tag">${task.category}</span>
              ${dueLabel ? `<span class="task-due ${over && !task.done ? 'overdue' : ''}">${dueLabel}</span>` : ''}
            </div>
          </div>
          <button class="delete-btn" onclick="deleteTask(${task.id})" title="Delete">✕</button>
        </div>`;
    }).join('');
  }

  function escapeHTML(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // Enter key support
  document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('taskInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') addTask();
    });

    // Random quote
    const q = quotes[Math.floor(Math.random() * quotes.length)];
    document.getElementById('quoteText').textContent = `"${q.text}"`;
    document.querySelector('.quote-card cite').textContent = `— ${q.author}`;

    setupDate();
    loadTasks(); // fetch tasks from the backend instead of localStorage

    // Auto-refresh every 30 seconds — keeps the list in sync if you have
    // multiple devices open at the same time
    setInterval(loadTasks, 30000);
  });
</script>
</body>
</html>
